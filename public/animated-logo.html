    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tl = gsap.timeline({ defaults: { ease: "power2.out" } });

            // 1. Scene Setup - Initial States
            // Gear is visible and rotating
            // Circuitry is hidden (opacity 0)
            // Text is hidden (opacity 0) and shifted left

            // Start Gear Rotation (Infinite)
            // We use a separate tween for the infinite loop
            gsap.to("#full-gear", {
                rotation: 360,
                svgOrigin: "283.37 1000", // Rotate around the precise calculated center
                repeat: -1,
                ease: "none",
                duration: 10
            });

            // 2. Circuitry Animation
            // Reveal opacity first
            gsap.set("#circuit-group path, #circuit-group circle", { opacity: 1 });
            
            // Animate Paths (DrawSVG style)
            const circuitPaths = document.querySelectorAll("#circuit-group path");
            circuitPaths.forEach(path => {
                const length = path.getTotalLength();
                // Set initial dasharray/offset to hide the line
                gsap.set(path, { strokeDasharray: length, strokeDashoffset: length });
                
                // Add to timeline
                // Lines grow from center
                tl.to(path, {
                    strokeDashoffset: 0,
                    duration: 1.5,
                    ease: "power2.inOut"
                }, "<"); // Run together or slightly staggered
            });

            // Animate Nodes (Pop in)
            // Circles are scaled from 0
            const nodes = document.querySelectorAll("#circuit-group circle");
            gsap.set(nodes, { scale: 0, transformOrigin: "center" });
            
            tl.to(nodes, {
                scale: 1,
                duration: 0.8,
                ease: "elastic.out(1, 0.5)",
                stagger: 0.1
            }, "-=0.5"); // Overlap with line drawing

            // 3. Text Animation
            // Slide in from left (from behind mask)
            // Current X (after container translate) is ~1400 (visible)
            // We want to start at X < 1000 (masked)
            // Relative shift: -500px puts it safely behind mask
            
            gsap.set("#text-group", { 
                x: -500, 
                opacity: 1 // Make visible so we can see it slide out
            });

            tl.to("#text-group", {
                x: 0, // Return to natural position
                duration: 1.2,
                ease: "power2.out"
            }, "-=0.2"); // Overlap slightly with nodes

        });
    </script>
